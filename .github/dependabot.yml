version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/docs/website"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 14
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
