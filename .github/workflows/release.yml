name: Release

on:
  push:
    tags:
      - 'v1.[0-9]+.[0-9]+'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 'wait for tests'
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.ref }}
          check-name: 'go test & build'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  build-all:
    name: 'build all binaries'
    runs-on: ubuntu-latest
    needs:
      - test
    permissions:
      contents: write
      packages: write
    env:
      VERSION_PACKAGE: 'github.com/coupergateway/couper/utils'
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - name: Set outputs
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%F')" >> $GITHUB_OUTPUT

      - uses: wangyoucao577/go-release-action@v1.55
        id: build
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          goversion: '1.26'
          binary_name: 'couper'
          ldflags: '-X ${{ env.VERSION_PACKAGE }}.VersionName=${{ github.ref_name }} -X ${{ env.VERSION_PACKAGE }}.BuildName=${{ steps.vars.outputs.sha_short }} -X ${{ env.VERSION_PACKAGE }}.BuildDate=${{ steps.vars.outputs.build_date }}'
          sha256sum: true
          md5sum: false
          asset_name: 'couper-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}'
          release_name: ${{ github.ref_name }}
          overwrite: true

  brewlease:
    name: 'update homebrew formula'
    runs-on: ubuntu-latest
    needs:
      - build-all
    steps:
      - name: 'checkout'
        uses: actions/checkout@v6
      - name: 'compute source tarball checksum'
        run: |
          curl -fsSL "https://github.com/coupergateway/couper/archive/refs/tags/${{ github.ref_name }}.tar.gz" -o source.tar.gz
          echo "SOURCE_SHA256=$(sha256sum source.tar.gz | cut -d ' ' -f1)" >> $GITHUB_ENV
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: 'prepare template'
        run: |
          curl -L https://github.com/malud/temgo/releases/download/0.2.1/tg -o tg
          chmod +x tg
          ./tg -i ${GITHUB_WORKSPACE}/.github/workflows/couper.rb
      - name: 'publish formula'
        env:
          GH_TOKEN: ${{ secrets.GH_COUPER_API_TOKEN }}
          BRANCH: 'release.${{ github.ref_name }}'
          COMMIT_MSG: 'Update formula to ${{ github.ref_name }} release'
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          git clone --depth=1 --branch=main \
            "https://x-access-token:${GH_TOKEN}@github.com/coupergateway/homebrew-couper.git" "$workdir"
          cd "$workdir"
          git config user.name 'couper-bot'
          git config user.email 'couperbot@gmail.com'
          git switch -c "$BRANCH"
          cp "${GITHUB_WORKSPACE}/.github/workflows/couper.rb" ./couper.rb
          git add couper.rb
          git commit -m "$COMMIT_MSG"
          git push --force-with-lease origin "$BRANCH"
          gh pr view "$BRANCH" --repo coupergateway/homebrew-couper >/dev/null 2>&1 || \
            gh pr create \
              --repo coupergateway/homebrew-couper \
              --base main \
              --head "$BRANCH" \
              --title "$COMMIT_MSG" \
              --body "Automated formula update for ${{ github.ref_name }}."
